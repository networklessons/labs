      !
      ASA Version 9.9(2)
      !
      hostname ASA1
      enable password $sha512$5000$HUMIyol6KWvg2IZRdAuELg==$3meDC0pd/JrkUtLBpFOLaA== pbkdf2
      names

      !
      interface GigabitEthernet0/0
       nameif OUTSIDE
       security-level 0
       ip address 10.10.10.1 255.255.255.0
        ! inserted by converter
        no shutdown
      !
      interface GigabitEthernet0/1
       nameif INSIDE
       security-level 100
       ip address 192.168.1.254 255.255.255.0
        ! inserted by converter
        no shutdown
      !
      interface Management0/0
       shutdown
       no nameif
       no security-level
       ip address 10.255.6.188 255.255.0.0
      !
      ftp mode passive
       subnet 192.168.1.0 255.255.255.0
       subnet 192.168.2.0 255.255.255.0
      pager lines 23
      mtu OUTSIDE 1500
      mtu INSIDE 1500
      no failover
      no monitor-interface service-module
      icmp unreachable rate-limit 1 burst-size 1
      no asdm history enable
      arp timeout 14400
      no arp permit-nonconnected
      arp rate-limit 8192
      !
       nat (INSIDE,OUTSIDE) dynamic interface
      route OUTSIDE 192.168.2.0 255.255.255.0 10.10.10.2 1
      timeout xlate 3:00:00
      timeout pat-xlate 0:00:30
      timeout conn 1:00:00 half-closed 0:10:00 udp 0:02:00 sctp 0:02:00 icmp 0:00:02
      timeout sunrpc 0:10:00 h323 0:05:00 h225 1:00:00 mgcp 0:05:00 mgcp-pat 0:05:00
      timeout sip 0:30:00 sip_media 0:02:00 sip-invite 0:03:00 sip-disconnect 0:02:00
      timeout sip-provisional-media 0:02:00 uauth 0:05:00 absolute
      timeout tcp-proxy-reassembly 0:01:00
      timeout floating-conn 0:00:00
      timeout conn-holddown 0:00:15
      timeout igp stale-route 0:01:10
      user-identity default-domain LOCAL
      no snmp-server location
      no snmp-server contact
       protocol esp encryption aes
       protocol esp integrity sha-1
       no validation-usage
       crl configure
       auto-import
       encryption aes
       integrity sha
       group 2
       prf sha
       lifetime seconds 86400
      telnet timeout 5
      ssh stricthostkeycheck
      ssh timeout 5
      ssh version 2
      ssh key-exchange group dh-group1-sha1
      console timeout 0
      console serial
      no threat-detection statistics tcp-intercept
       ikev2 remote-authentication pre-shared-key CISCO456
       ikev2 local-authentication pre-shared-key CISCO123
      !
       match default-inspection-traffic
      !
      !
       parameters
        message-length maximum client auto
        message-length maximum 512
        no tcp-inspection
       class inspection_default
        inspect ip-options
        inspect netbios
        inspect rtsp
        inspect sunrpc
        inspect tftp
        inspect xdmcp
        inspect dns preset_dns_map
        inspect ftp
        inspect h323 h225
        inspect h323 ras
        inspect rsh
        inspect esmtp
        inspect sqlnet
        inspect sip
        inspect skinny
       parameters
        message-length maximum client auto
        message-length maximum 512
        no tcp-inspection
       parameters
        message-length maximum client auto
        message-length maximum 512
        no tcp-inspection
      !
      prompt hostname context
      no call-home reporting anonymous
