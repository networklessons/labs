nodes:
- boot_disk_size: null
  configuration:
  - name: day0-config
    content: |-
      !
      ASA Version 9.8(2)
      !
      hostname ASA1
      enable password $sha512$5000$fEBgFez/YWRKiDUnqatvZw==$gSALj60rpoJvEHAMUg6Ukw== pbkdf2
      xlate per-session deny tcp any4 any4
      xlate per-session deny tcp any4 any6
      xlate per-session deny tcp any6 any4
      xlate per-session deny tcp any6 any6
      xlate per-session deny udp any4 any4 eq domain
      xlate per-session deny udp any4 any6 eq domain
      xlate per-session deny udp any6 any4 eq domain
      xlate per-session deny udp any6 any6 eq domain
      names

      !
      interface GigabitEthernet0/0
       nameif INSIDE
       security-level 100
       ip address 192.168.1.254 255.255.255.0
        ! inserted by converter
        no shutdown
      !
      interface GigabitEthernet0/1
       nameif OUTSIDE
       security-level 0
       ip address 172.16.1.1 255.255.255.0
        ! inserted by converter
        no shutdown
      !
      interface Management0/0
       shutdown
       no nameif
       no security-level
       ip address 10.255.2.78 255.255.0.0
      !
      ftp mode passive
      pager lines 23
      mtu INSIDE 1500
      mtu OUTSIDE 1500
      no failover
      no monitor-interface service-module
      icmp unreachable rate-limit 1 burst-size 1
      no asdm history enable
      arp timeout 14400
      no arp permit-nonconnected
      arp rate-limit 8192
      timeout xlate 3:00:00
      timeout pat-xlate 0:00:30
      timeout conn 1:00:00 half-closed 0:10:00 udp 0:02:00 sctp 0:02:00 icmp 0:00:02
      timeout sunrpc 0:10:00 h323 0:05:00 h225 1:00:00 mgcp 0:05:00 mgcp-pat 0:05:00
      timeout sip 0:30:00 sip_media 0:02:00 sip-invite 0:03:00 sip-disconnect 0:02:00
      timeout sip-provisional-media 0:02:00 uauth 0:05:00 absolute
      timeout tcp-proxy-reassembly 0:01:00
      timeout floating-conn 0:00:00
      timeout conn-holddown 0:00:15
      timeout igp stale-route 0:01:10
      user-identity default-domain LOCAL
      no snmp-server location
      no snmp-server contact
       no validation-usage
       crl configure
       auto-import
       authentication pre-share
       encryption aes
       hash sha
       group 2
       lifetime 86400
      telnet timeout 5
      ssh stricthostkeycheck
      ssh timeout 5
      ssh key-exchange group dh-group1-sha1
      console timeout 0
      no threat-detection statistics tcp-intercept
       dns-server value 8.8.8.8
       vpn-idle-timeout 15
       vpn-filter value RESTRICT_VPN
       split-tunnel-policy tunnelspecified
       split-tunnel-network-list value SPLIT_TUNNEL
      username VPN_USER password $sha512$5000$/wHKmSEy6ixVa4gN/+S9wQ==$LnJI3Hko/OiDf0RTSzCVVg== pbkdf2
      username VPN_USER attributes
       vpn-filter value RESTRICT_VPN_USER
       address-pool VPN_POOL
       default-group-policy VPN_POLICY
       ikev1 pre-shared-key MY_SHARED_KEY
      !
       match default-inspection-traffic
      !
      !
       parameters
        message-length maximum client auto
        message-length maximum 512
        no tcp-inspection
       class inspection_default
        inspect ip-options
        inspect netbios
        inspect rtsp
        inspect sunrpc
        inspect tftp
        inspect xdmcp
        inspect dns preset_dns_map
        inspect ftp
        inspect h323 h225
        inspect h323 ras
        inspect rsh
        inspect esmtp
        inspect sqlnet
        inspect sip
        inspect skinny
       parameters
        message-length maximum client auto
        message-length maximum 512
        no tcp-inspection
       parameters
        message-length maximum client auto
        message-length maximum 512
        no tcp-inspection
      !
      prompt hostname context
      no call-home reporting anonymous
      call-home
       profile CiscoTAC-1
        no active
        destination address http https://tools.cisco.com/its/service/oddce/services/DDCEService
        destination address email callhome@cisco.com
        destination transport-method http
        subscribe-to-alert-group diagnostic
        subscribe-to-alert-group environment
        subscribe-to-alert-group inventory periodic monthly
        subscribe-to-alert-group configuration periodic monthly
        subscribe-to-alert-group telemetry periodic daily
       profile License
        destination address http https://tools.cisco.com/its/service/oddce/services/DDCEService
        destination transport-method http
