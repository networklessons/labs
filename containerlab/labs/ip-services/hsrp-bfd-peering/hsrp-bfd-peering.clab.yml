# HSRP with two routers and one host.
# R1, R2, H1 connected to SW1.
# R1, R2, R3 connected to SW2.

name: hsrp-bfd-peering
mgmt:
  network: mgmt-ipv4
  ipv4-subnet: 10.65.97.0/24
topology:
  kinds:
    cisco_iol:
      image: docker-registry.nwl.lab/cisco_iol:17.12.01
  nodes:
    R1:
      kind: cisco_iol
      mgmt-ipv4: 10.65.97.11
      startup-config: ./clab-hsrp-bfd-peering/R1/startup-config.cfg.partial
    R2:
      kind: cisco_iol
      mgmt-ipv4: 10.65.97.12
      startup-config: ./clab-hsrp-bfd-peering/R2/startup-config.cfg.partial
    R3:
      kind: cisco_iol
      mgmt-ipv4: 10.65.97.13
      startup-config: ./clab-hsrp-bfd-peering/R3/startup-config.cfg.partial
    H1:
      kind: cisco_iol
      mgmt-ipv4: 10.65.97.14
      startup-config: ./clab-hsrp-bfd-peering/H1/startup-config.cfg.partial
    SW1:
      kind: cisco_iol
      image: docker-registry.nwl.lab/cisco_iol:l2-17.12.01
      type: l2
      mgmt-ipv4: 10.65.97.15
    SW2:
      kind: cisco_iol
      image: docker-registry.nwl.lab/cisco_iol:l2-17.12.01
      type: l2
      mgmt-ipv4: 10.65.97.16
  links:
    - endpoints: ["R1:Ethernet0/1", "SW1:Ethernet0/1"]
    - endpoints: ["R2:Ethernet0/1", "SW1:Ethernet0/2"]
    - endpoints: ["H1:Ethernet0/1", "SW1:Ethernet0/3"]
    - endpoints: ["R1:Ethernet0/2", "SW2:Ethernet0/1"]
    - endpoints: ["R2:Ethernet0/2", "SW2:Ethernet0/2"]
    - endpoints: ["R3:Ethernet0/1", "SW2:Ethernet0/3"]
