# Cisco IOL lab with two routers running OSPF and MPLS TE 
# to inspect LSA Type 10 (Opaque LSA Local Scope) for MPLS TE.

name: ospf-lsa-type-10-mpls-te

mgmt:
  network: mgmt-ipv4
  ipv4-subnet: 10.65.97.0/24

topology:
  kinds:
    cisco_c8000v:
      image: docker-registry.nwl.lab/cisco_c8000v:17.13.01a
  nodes:
    R1:
      kind: cisco_c8000v
      mgmt-ipv4: 10.65.97.11
      startup-config: ./clab-ospf-lsa-type-10-mpls-te/R1/config/startup-config.cfg
    R2:
      kind: cisco_c8000v
      mgmt-ipv4: 10.65.97.12
      startup-config: ./clab-ospf-lsa-type-10-mpls-te/R2/config/startup-config.cfg
  links:
    - endpoints: ["R1:eth1", "R2:eth1"]
