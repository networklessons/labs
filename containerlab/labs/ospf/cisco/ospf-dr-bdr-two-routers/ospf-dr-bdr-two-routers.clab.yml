# OSPF with two routers to test DR/BDR election.

name: ospf-dr-bdr-two-routers
mgmt:
  network: statics
  ipv4-subnet: 172.100.100.0/24
topology:
  kinds:
    cisco_iol:
      image: docker-registry.nwl.lab/cisco_iol:17.12.01
  nodes:
    R1:
      kind: cisco_iol
      mgmt-ipv4: 172.100.100.11
      startup-config: ./clab-ospf-dr-bdr-two-routers/R1/startup-config.cfg.partial
    R2:
      kind: cisco_iol
      mgmt-ipv4: 172.100.100.12
      startup-config: ./clab-ospf-dr-bdr-two-routers/R2/startup-config.cfg.partial
  links:
    - endpoints: ["R1:Ethernet0/1","R2:Ethernet0/1"]